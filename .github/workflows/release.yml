name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Swift
        uses: swift-actions/setup-swift@v1
        with:
          swift-version: '5.9'
      
      - name: Build Application
        run: |
          # Create app bundle structure
          mkdir -p BTCWatcher.app/Contents/MacOS
          mkdir -p BTCWatcher.app/Contents/Resources
          # Build with xcrun using macOS SDK, targeting macOS 13.0
          xcrun swiftc \
            -target arm64-apple-macos13.0 \
            -o BTCWatcher.app/Contents/MacOS/BTCWatcher \
            Constants.swift main.swift
          # Set permissions and copy resources
          chmod +x BTCWatcher.app/Contents/MacOS/BTCWatcher
          cp Info.plist BTCWatcher.app/Contents/ || true
          cp -r Resources/* BTCWatcher.app/Contents/Resources/ 2>/dev/null || true
          # Sign and package
          xattr -cr BTCWatcher.app
          codesign --force --deep --sign - BTCWatcher.app
          ditto -c -k --keepParent BTCWatcher.app BTCWatcher.app.zip
      
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: BTCWatcher.app.zip
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
